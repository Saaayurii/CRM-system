# =============================================================
# CRM System — Root Docker Compose (Production)
# =============================================================
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d   # start everything
#
# Admin tools (pgadmin, redis-commander):
#   docker compose --profile admin up -d
# =============================================================

include:
  - path: backend/docker-compose.yml

services:
  # ── Frontend (Next.js standalone) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
        NEXT_PUBLIC_CHAT_WS_URL: ${NEXT_PUBLIC_CHAT_WS_URL:-}
        API_GATEWAY_INTERNAL_URL: http://api-gateway:3000
        CHAT_SERVICE_INTERNAL_URL: http://chat-service:3011
    container_name: crm-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3030
      # Server-side rewrite targets (Next.js rewrites run on the server)
      API_GATEWAY_INTERNAL_URL: http://api-gateway:3000
      CHAT_SERVICE_INTERNAL_URL: http://chat-service:3011
    depends_on:
      - api-gateway
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3030"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Nginx reverse proxy (single external entry point) ───────
  nginx:
    image: nginx:1.25-alpine
    container_name: crm-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_PORT_SSL:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    depends_on:
      - frontend
      - api-gateway
      - chat-service
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3

  # ── Certbot (SSL certificate issuance and auto-renewal) ─────
  certbot:
    image: certbot/certbot:latest
    container_name: crm-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    # Auto-renew loop: checks every 12h, renews if expiry < 30 days
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --quiet --webroot --webroot-path=/var/www/certbot; sleep 12h & wait $${!}; done"
    networks:
      - crm-network

  # ── PostgreSQL backup (daily at 03:00, keeps 7 days) ────────
  db-backup:
    image: postgres:15-alpine
    container_name: crm-db-backup
    restart: unless-stopped
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: /bin/sh -c "trap exit TERM; while :; do
        sleep $$(( $(date -d 'tomorrow 03:00' +%s 2>/dev/null || date -v+1d -v3H -v0M -v0S +%s) - $(date +%s) ));
        pg_dump -h postgres -U ${POSTGRES_USER:-postgres} ${POSTGRES_DB:-construction_crm} | gzip > /backups/crm_$$(date +%Y%m%d_%H%M%S).sql.gz;
        find /backups -name '*.sql.gz' -mtime +7 -delete;
      done"
    depends_on:
      - postgres
    networks:
      - crm-network

volumes:
  certbot-www:
  certbot-certs:
