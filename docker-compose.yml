# =============================================================
# CRM System — Root Docker Compose (Production)
# =============================================================
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d   # start everything
#
# Admin tools (pgadmin, redis-commander):
#   docker compose --profile admin up -d
# =============================================================

include:
  - path: backend/docker-compose.yml

services:
  # ── Frontend (Next.js standalone) ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
        NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${NEXT_PUBLIC_VAPID_PUBLIC_KEY:-}
        NEXT_PUBLIC_CHAT_WS_URL: ${NEXT_PUBLIC_CHAT_WS_URL:-}
        API_GATEWAY_INTERNAL_URL: http://api-gateway:3000
        CHAT_SERVICE_INTERNAL_URL: http://chat-service:3011
    container_name: crm-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3030
      # Server-side rewrite targets (Next.js rewrites run on the server)
      API_GATEWAY_INTERNAL_URL: http://api-gateway:3000
      CHAT_SERVICE_INTERNAL_URL: http://chat-service:3011
    depends_on:
      - api-gateway
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3030"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

  # ── Nginx reverse proxy (single external entry point) ───────
  nginx:
    image: nginx:1.25-alpine
    container_name: crm-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - api-gateway
      - chat-service
    networks:
      - crm-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
