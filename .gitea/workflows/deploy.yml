name: Deploy to Production

on:
  push:
    branches:
      - main

# Гейта-сборки на раннере НЕТ намеренно: deploy.sh собирает Docker-образы ДО
# пересоздания контейнеров и ДО включения заглушки, поэтому упавший билд не
# трогает прод (старые контейнеры продолжают работать) — серверная сборка и есть
# гейт по ТИПАМ (tsc в `next build` / `nest build`). Отдельный CI-build удваивал бы
# компиляцию и замедлял каждый деплой.
#
# А вот быстрый ГЕЙТ ПО ЛИНТУ — дёшев: Oxlint это standalone-бинарь (Rust), ему НЕ
# нужны node_modules проекта, прогон всего фронта+бэка занимает доли секунды. Ловит
# явные баги (unused-vars, битые промисы и т.п.) ДО того, как деплой тронет прод.
# tsgo-тайпчек в CI не тащим (нужна установка зависимостей → медленно); он для
# локали/pre-push (`npm run typecheck` / `pnpm typecheck`), а типы всё равно
# гейтит серверная Docker-сборка.
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # `actions/setup-node@v4` убран намеренно: он тянется с github.com, и при
      # недоступности github раннер не может его склонировать → джоб падал ещё до
      # линта (см. «some refs were not updated»). Образ раннера
      # gitea/runner-images:ubuntu-latest уже содержит Node/npx, поэтому отдельная
      # установка не нужна — линт зависит только от npm-реестра (oxlint), не от github.
      - name: Oxlint — frontend
        run: cd frontend && node --version && npx --yes oxlint@1.72.0

      - name: Oxlint — backend (24 сервиса)
        run: cd backend && npx --yes oxlint@1.72.0

  deploy:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.100.65
          username: admin_315
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
            cd /opt/crm-system
            OLD_REF=$(git rev-parse HEAD)
            git pull origin main
            cd backend
            OLD_REF=$OLD_REF bash /opt/crm-system/deploy.sh
