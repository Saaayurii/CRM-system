name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  # ── Quality gate: компиляция должна пройти ДО того, как сервер начнёт
  #    останавливать/пересобирать контейнеры. Если build падает — deploy не
  #    запускается, прод остаётся нетронутым. Билд = typecheck + компиляция
  #    (nest build / next build); ловит ошибки сборки, которые иначе уронили бы
  #    деплой на полпути. Lint — информационный (в коде есть давние lint-замечания,
  #    блокировать ими нельзя).
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # нужна история для turbo affected-фильтра

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        run: npm install -g pnpm@9.15.9

      # ── Backend ──────────────────────────────────────────────────────────
      - name: Backend — install deps
        working-directory: backend
        run: pnpm install --frozen-lockfile

      - name: Backend — prisma generate
        working-directory: backend
        run: pnpm db:generate

      - name: Backend — build (typecheck + compile, only affected services)
        working-directory: backend
        run: |
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || echo "$BASE" | grep -qE '^0+$' || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "No valid base ref — building ALL services"
            pnpm exec turbo run build
          else
            echo "Building services affected since $BASE"
            pnpm exec turbo run build --filter="...[${BASE}]"
          fi

      - name: Backend — lint (informational)
        working-directory: backend
        continue-on-error: true
        run: pnpm exec turbo run lint

      # ── Frontend (только если менялся frontend/) ─────────────────────────
      - name: Detect frontend changes
        id: fe
        run: |
          BASE="${{ github.event.before }}"
          if [ -z "$BASE" ] || echo "$BASE" | grep -qE '^0+$' || ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          elif git diff --name-only "$BASE" HEAD | grep -q '^frontend/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Frontend — install deps
        if: steps.fe.outputs.changed == 'true'
        working-directory: frontend
        run: npm ci

      - name: Frontend — build (typecheck + compile)
        if: steps.fe.outputs.changed == 'true'
        working-directory: frontend
        run: npm run build

  # ── Deploy: только если quality прошёл ───────────────────────────────────
  deploy:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.100.65
          username: admin_315
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
            cd /opt/crm-system
            OLD_REF=$(git rev-parse HEAD)
            git pull origin main
            cd backend
            OLD_REF=$OLD_REF bash /opt/crm-system/deploy.sh
