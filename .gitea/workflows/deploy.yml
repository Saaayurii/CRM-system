name: Deploy to Production

on:
  push:
    branches:
      - main

# Гейта-сборки на раннере НЕТ намеренно: deploy.sh собирает Docker-образы ДО
# пересоздания контейнеров и ДО включения заглушки, поэтому упавший билд не
# трогает прод (старые контейнеры продолжают работать) — серверная сборка и есть
# гейт. Отдельный CI-build удваивал бы компиляцию и замедлял каждый деплой.
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 192.168.100.65
          username: admin_315
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 60m
          script: |
            cd /opt/crm-system
            OLD_REF=$(git rev-parse HEAD)
            git pull origin main
            cd backend
            OLD_REF=$OLD_REF bash /opt/crm-system/deploy.sh
