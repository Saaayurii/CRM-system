name: E2E Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # E2E tests — each service spins up its own postgres + redis
  # ──────────────────────────────────────────────────────────────────
  e2e:
    name: ${{ matrix.service }} (e2e)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api-gateway
            port: 3000
          - service: auth-service
            port: 3001
          - service: users-service
            port: 3002
          - service: projects-service
            port: 3003
          - service: tasks-service
            port: 3004
          - service: materials-service
            port: 3005
          - service: suppliers-service
            port: 3006
          - service: finance-service
            port: 3007
          - service: inspections-service
            port: 3008
          - service: hr-service
            port: 3009
          - service: notifications-service
            port: 3010

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: construction_crm
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 6379:6379

    defaults:
      run:
        working-directory: backend/${{ matrix.service }}

    env:
      NODE_ENV: test
      PORT: ${{ matrix.port }}
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/construction_crm?schema=public
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      # JWT
      JWT_ACCESS_SECRET: e2e-access-secret-ci
      JWT_REFRESH_SECRET: e2e-refresh-secret-ci
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      # Auth
      BCRYPT_SALT_ROUNDS: 4
      # Rate limiting (relaxed for tests)
      RATE_LIMIT_TTL: 60
      RATE_LIMIT_MAX: 1000
      # Notifications (dummy SMTP — mocked in tests)
      SMTP_HOST: localhost
      SMTP_PORT: 1025
      SMTP_USER: ci@test.local
      SMTP_PASS: ci-pass
      MAIL_FROM: ci@test.local
      # Internal service URLs (tests mock HTTP calls, but env must be set)
      AUTH_SERVICE_URL: http://localhost:3001
      USERS_SERVICE_URL: http://localhost:3002
      PROJECTS_SERVICE_URL: http://localhost:3003
      TASKS_SERVICE_URL: http://localhost:3004
      MATERIALS_SERVICE_URL: http://localhost:3005
      SUPPLIERS_SERVICE_URL: http://localhost:3006
      FINANCE_SERVICE_URL: http://localhost:3007
      INSPECTIONS_SERVICE_URL: http://localhost:3008
      HR_SERVICE_URL: http://localhost:3009
      NOTIFICATIONS_SERVICE_URL: http://localhost:3010

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Apply database schema
        working-directory: .
        run: |
          PGPASSWORD=postgres psql \
            -h localhost -U postgres -d construction_crm \
            -f database/CRM.sql
        continue-on-error: false

      - name: Apply seed data
        working-directory: .
        run: |
          if [ -f database/seeds.sql ]; then
            PGPASSWORD=postgres psql \
              -h localhost -U postgres -d construction_crm \
              -f database/seeds.sql
          fi
        continue-on-error: true

      - name: Generate Prisma client
        run: |
          if [ -f prisma/schema.prisma ]; then
            npx prisma generate
          fi

      - name: Run e2e tests
        run: npm run test:e2e -- --forceExit
        timeout-minutes: 15

  # ──────────────────────────────────────────────────────────────────
  # Summary gate
  # ──────────────────────────────────────────────────────────────────
  e2e-success:
    name: E2E passed
    runs-on: ubuntu-latest
    needs: [e2e]
    if: always()
    steps:
      - name: Check all e2e jobs
        run: |
          if [[ "${{ needs.e2e.result }}" != "success" ]]; then
            echo "One or more E2E jobs failed"
            exit 1
          fi
          echo "All E2E jobs passed"
