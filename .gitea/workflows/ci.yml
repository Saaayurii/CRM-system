name: CI — Lint, Build & Unit Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────────
  # Backend: lint + build + unit tests (matrix per service)
  # ──────────────────────────────────────────────────────────────────
  backend:
    name: ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - audit-service
          - auth-service
          - automation-service
          - calendar-service
          - chat-service
          - clients-service
          - dashboard-service
          - dictionary-service
          - documents-service
          - equipment-service
          - finance-service
          - hr-service
          - inspections-service
          - materials-service
          - notifications-service
          - projects-service
          - reports-service
          - settings-service
          - suppliers-service
          - tasks-service
          - training-service
          - users-service
          - wiki-service

    defaults:
      run:
        working-directory: backend/${{ matrix.service }}

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/construction_crm
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ci-access-secret-do-not-use-in-prod
      JWT_REFRESH_SECRET: ci-refresh-secret-do-not-use-in-prod
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 7d
      BCRYPT_SALT_ROUNDS: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/${{ matrix.service }}/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Generate Prisma client
        run: |
          if [ -f prisma/schema.prisma ]; then
            npx prisma generate
          fi

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test -- --passWithNoTests --forceExit --ci --coverage
        timeout-minutes: 10

  # ──────────────────────────────────────────────────────────────────
  # Frontend: lint + type-check + build
  # ──────────────────────────────────────────────────────────────────
  frontend:
    name: frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      NEXT_TELEMETRY_DISABLED: 1
      NEXT_PUBLIC_API_URL: http://localhost:3000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        timeout-minutes: 15

  # ──────────────────────────────────────────────────────────────────
  # Summary gate — used as a single required status check in branch
  # protection rules
  # ──────────────────────────────────────────────────────────────────
  ci-success:
    name: CI passed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: always()
    steps:
      - name: Check all jobs
        run: |
          if [[ "${{ needs.backend.result }}" != "success" || "${{ needs.frontend.result }}" != "success" ]]; then
            echo "One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed"
